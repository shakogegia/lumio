"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Copy local, gitignored env files into each new workspace so DATABASE_URL,
# DB_PORT, PHOTOS_DIR and CACHE_DIR are present. Conductor copies these from the
# repository's root checkout, so make sure a `.env` exists there.
file_include_globs = ".env*"

# Lifecycle commands live in versioned scripts under scripts/conductor/ so they
# stay readable, reviewable, and runnable on their own. They run from the
# workspace directory.
[scripts]
setup = "bash scripts/conductor/setup.sh"
run = "bash scripts/conductor/run.sh"
run_mode = "concurrent"
archive = "bash scripts/conductor/archive.sh"

# Production stack: Postgres + web + worker.
# One published image (shakogegia/lumio:latest) run as two containers, chosen by
# the command arg. Pulls the image — building is handled by the Makefile.
#
# Run it (set PHOTOS_DIR to an ABSOLUTE host path; see infra/.env or the Makefile):
#   docker compose -f infra/docker-compose.prod.yml up -d
#
# For Portainer, paste this file into a Stack — see docs/deployment/portainer.md.
name: lumio

services:
  db:
    image: postgres:16
    container_name: lumio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumio}
      POSTGRES_DB: ${POSTGRES_DB:-lumio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumio} -d ${POSTGRES_DB:-lumio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: shakogegia/lumio:latest
    container_name: lumio-web
    command: ["web"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lumio}:${POSTGRES_PASSWORD:-lumio}@db:5432/${POSTGRES_DB:-lumio}?schema=public
      PHOTOS_DIR: /data/photos
      CACHE_DIR: /data/cache
      PORT: "3000"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${PHOTOS_DIR}:/data/photos:ro
      - cache:/data/cache

  worker:
    image: shakogegia/lumio:latest
    container_name: lumio-worker
    command: ["worker"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lumio}:${POSTGRES_PASSWORD:-lumio}@db:5432/${POSTGRES_DB:-lumio}?schema=public
      PHOTOS_DIR: /data/photos
      CACHE_DIR: /data/cache
    volumes:
      - ${PHOTOS_DIR}:/data/photos
      - cache:/data/cache

volumes:
  pgdata:
  cache:

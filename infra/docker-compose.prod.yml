# Production stack: Postgres + web + worker.
# One published image (shakogegia/lumio:latest) run as two containers, chosen by
# the command arg. Pulls the image — building is handled by the Makefile.
#
# Run it (set MEDIA_DIR to an ABSOLUTE host path holding your photos; see
# infra/.env or the Makefile):
#   docker compose -f infra/docker-compose.prod.yml up -d
#
# MEDIA_DIR is bind-mounted to /media (= MEDIA_ROOT). After first-run setup you
# create one or more CATALOGS in the app, each pointing at a folder at/under
# /media (the in-app folder browser is bounded to it). Regenerable renditions and
# trashed originals live in the named `cache`/`trash` volumes, subdivided per
# catalog. For Portainer, paste this file into a Stack — see docs/deployment/portainer.md.
name: lumio

services:
  db:
    image: postgres:16
    container_name: lumio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumio}
      POSTGRES_DB: ${POSTGRES_DB:-lumio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumio} -d ${POSTGRES_DB:-lumio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: shakogegia/lumio:latest
    container_name: lumio-web
    command: ["web"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lumio}:${POSTGRES_PASSWORD:-lumio}@db:5432/${POSTGRES_DB:-lumio}?schema=public
      # Root the in-app folder browser is bounded to; catalogs are folders at/under it.
      MEDIA_ROOT: /media
      # Internal roots for regenerable renditions + trashed originals (per-catalog
      # subdirs live under these). Backed by named volumes below.
      CACHE_DIR: /data/cache
      TRASH_DIR: /data/trash
      PORT: "3000"
      # Max upload size (b/kb/mb/gb). Changing it only needs a container restart.
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-200mb}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      # Comma-separated extra origins to trust beyond BETTER_AUTH_URL — list every
      # host you reach the app from (LAN IP, Tailscale host, etc.) or login is
      # rejected with INVALID_ORIGIN. e.g. "http://192.168.1.50:3000,https://box.tailnet.ts.net"
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      # Set false to allow logins over plain HTTP (http://<lan-ip>:3000). ⚠️ Drops
      # the cookie Secure flag on ALL origins — use only on a trusted LAN/Tailscale.
      USE_SECURE_COOKIES: ${USE_SECURE_COOKIES:-true}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Read-write: uploads write new originals here, and "delete originals" on a
      # catalog removes them. Mount your photo library at /media; create catalogs
      # pointing at /media or subfolders of it.
      - ${MEDIA_DIR}:/media
      - cache:/data/cache
      - trash:/data/trash

  worker:
    image: shakogegia/lumio:latest
    container_name: lumio-worker
    command: ["worker"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # The worker shares this box with web + db. A bulk import is CPU-heavy, so on
    # a small machine (e.g. an N100 mini-PC) cap the worker's CPUs to guarantee it
    # can never starve them — and set INGEST_CONCURRENCY to match. Uncomment and
    # tune to your hardware (needs `docker compose`, not Swarm):
    # cpus: "2"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lumio}:${POSTGRES_PASSWORD:-lumio}@db:5432/${POSTGRES_DB:-lumio}?schema=public
      MEDIA_ROOT: /media
      CACHE_DIR: /data/cache
      TRASH_DIR: /data/trash
      # Images processed in parallel during a scan. Empty → the worker uses HALF
      # its visible cores (leaving CPU for web + Postgres) and sizes the libuv
      # threadpool to match. Pin it to the worker's CPU allotment if you cap CPUs.
      INGEST_CONCURRENCY: ${INGEST_CONCURRENCY:-}
    volumes:
      - ${MEDIA_DIR}:/media
      - cache:/data/cache
      - trash:/data/trash

volumes:
  pgdata:
  cache:
  trash:
